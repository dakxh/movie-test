<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artplayer | Native HLS Master M3U8 Tester (Edge CDN + WebVTT)</title>

    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --primary: #4A90E2;
            --danger: #e24a4a;
            --text: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        .header-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input,
        select {
            flex: 1;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            border-color: var(--primary);
        }

        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #357ABD;
        }

        #external-controls {
            display: none;
            background: #111;
            border: 1px solid #333;
            border-left: 4px solid var(--danger);
        }

        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }

        .control-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        #player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* --- HARDWARE ACCELERATED WEB-VTT STYLING --- */
        video::cue {
            color: #f7f7f7;
            font-size: 1.8rem;
            font-weight: 400;
            line-height: 1.1;
            font-family: "Arial", sans-serif;
            background-color: transparent;
            text-rendering: optimizeLegibility; /* Forces GPU font smoothing */
            text-shadow:
                0 0 8px #000,
                0 0 8px #000,
                0 0 8px #000,
                -1px -1px 0 #000, 1px -1px 0 #000,
                -1px 1px 0 #000, 1px 1px 0 #000;
        }

        video::cue(b) {
            color: #ffd700;
        }

        video::cue(i) {
            font-style: italic;
            color: #e0e0e0;
        }

        /* Responsive Vertical Shift (Avoids hardcoded px for mobile compatibility) */
        video::-webkit-media-text-track-display {
            transform: translateY(-5vh);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-box">
            <h2>1. Master M3U8 Source</h2>
            <div class="input-group">
                <input type="text" id="m3u8Url" placeholder="Enter Master .m3u8 URL..."
                    value="https://huggingface.co/buckets/Gravatar44/xkca/56.Days/Season.01/Episode.02/master.m3u8">
                <button onclick="loadStream()">Load Player</button>
            </div>
        </div>

        <div class="header-box" id="external-controls">
            <h2>2. Standard Stream Tracks</h2>
            <div class="control-row">
                <div class="control-group">
                    <label for="audioSelect">Audio Track</label>
                    <select id="audioSelect" onchange="forceAudioTrack()">
                        <option value="">Loading Audio...</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="subSelect">Subtitle Track</label>
                    <select id="subSelect" onchange="forceSubTrack()">
                        <option value="">Loading Subtitles...</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="player-wrapper"></div>
    </div>

    <script>
        let art = null;
        let globalHls = null;

        const CORS_PROXY_BASE = "https://xkca.dadalapathy756.workers.dev/?url=";
        const proxyCache = new Map(); // Shared Memoization Cache

        // High-speed string splitter for HF Bucket links
        function generateProperResolvedHfPath(u) {
            if (!u || typeof u !== 'string') return u;
            let sanitized = u.split('?download=true')[0].split('&download=true')[0];
            
            if (!sanitized.startsWith('https://huggingface.co/buckets/') || sanitized.includes('/resolve/')) {
                return sanitized;
            }

            const parts = sanitized.split('/');
            if (parts.length > 6) {
                parts.splice(6, 0, 'resolve');
                return parts.join('/');
            }
            return sanitized;
        }

        function ensureCorsHeaderProxy(rawAbsoluteUrl) {
            if (proxyCache.has(rawAbsoluteUrl)) {
                return proxyCache.get(rawAbsoluteUrl);
            }

            const urlToFetch = generateProperResolvedHfPath(rawAbsoluteUrl);
            let finalUrl = urlToFetch;
            
            if (urlToFetch.includes('huggingface.co/buckets/')) {
                finalUrl = CORS_PROXY_BASE + encodeURIComponent(urlToFetch);
            }
            
            proxyCache.set(rawAbsoluteUrl, finalUrl);
            return finalUrl;
        }

        function loadStream() {
            let inputUrl = document.getElementById('m3u8Url').value.trim();
            if (!inputUrl) {
                alert('Please enter a valid URL.');
                return;
            }

            initializePlayer(ensureCorsHeaderProxy(inputUrl));
        }

        function initializePlayer(hlsUrl) {
            if (art) {
                art.destroy(true);
                art = null;
            }
            
            // Reset UI state locks per movie load
            window.audioTracksInitialized = false;
            window.subTracksInitialized = false;

            document.getElementById('external-controls').style.display = 'block';

            const artOptions = {
                container: '#player-wrapper',
                url: hlsUrl,
                type: 'm3u8',
                volume: 0.7,
                autoplay: false,
                setting: true,
                customType: {
                    m3u8: function (video, url, artInstance) {
                        if (Hls.isSupported()) {
                            if (artInstance.hls) artInstance.hls.destroy();

                            class HfBucketsProxyLoader extends Hls.DefaultConfig.loader {
                                load(context, config, callbacks) {
                                    if (context.url) {
                                        context.url = ensureCorsHeaderProxy(context.url);
                                    }
                                    super.load(context, config, callbacks);
                                }
                            }

                            // Aggressive Edge CDN & Worker Transmuxing Configuration
                            const hls = new Hls({
                                loader: HfBucketsProxyLoader,
                                renderTextTracksNatively: true,
                                enableWorker: true,             // Offloads WebVTT/TS separation to a background thread
                                maxBufferLength: 120,           
                                maxMaxBufferLength: 180,        
                                maxBufferSize: 100 * 1024 * 1024,
                                manifestLoadingTimeOut: 15000,
                                fragLoadingTimeOut: 30000,      
                                lowLatencyMode: false           
                            });
                            
                            globalHls = hls;

                            hls.loadSource(url);
                            hls.attachMedia(video);
                            artInstance.hls = hls;

                            artInstance.on('destroy', () => hls.destroy());

                            hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, function (_, data) {
                                if (window.audioTracksInitialized) return; // Prevent DOM Thrashing
                                
                                const audioSelect = document.getElementById('audioSelect');
                                if (data.audioTracks && data.audioTracks.length > 0) {
                                    window.audioTracksInitialized = true;
                                    let audioHtml = '';
                                    data.audioTracks.forEach((track, index) => {
                                        const isSelected = (index === hls.audioTrack) ? 'selected' : '';
                                        const name = track.name || track.language || `Audio Track ${index + 1}`;
                                        audioHtml += `<option value="${index}" ${isSelected}>${name}</option>`;
                                    });
                                    audioSelect.innerHTML = audioHtml;
                                    audioSelect.disabled = false;
                                } else {
                                    audioSelect.innerHTML = '<option value="">No alternative audio</option>';
                                    audioSelect.disabled = true;
                                }
                            });

                            hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, function (_, data) {
                                if (window.subTracksInitialized) return; // Prevent DOM Thrashing
                                
                                const subSelect = document.getElementById('subSelect');
                                if (data.subtitleTracks && data.subtitleTracks.length > 0) {
                                    window.subTracksInitialized = true;
                                    let subHtml = '<option value="-1">Off</option>';
                                    data.subtitleTracks.forEach((track, index) => {
                                        const isSelected = (index === hls.subtitleTrack) ? 'selected' : '';
                                        const name = track.name || track.language || `Subtitle Track ${index + 1}`;
                                        subHtml += `<option value="${index}" ${isSelected}>${name}</option>`;
                                    });
                                    subSelect.innerHTML = subHtml;
                                    subSelect.disabled = false;
                                } else {
                                    subSelect.innerHTML = '<option value="">No subtitles available</option>';
                                    subSelect.disabled = true;
                                }
                            });

                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = ensureCorsHeaderProxy(url);
                        }
                    }
                }
            };

            art = new Artplayer(artOptions);
        }

        function forceAudioTrack() {
            if (globalHls) {
                const audioSelect = document.getElementById('audioSelect');
                globalHls.audioTrack = parseInt(audioSelect.value, 10);
            }
        }

        function forceSubTrack() {
            if (globalHls) {
                const subSelect = document.getElementById('subSelect');
                globalHls.subtitleTrack = parseInt(subSelect.value, 10);
            }
        }
    </script>

</body>

</html>
